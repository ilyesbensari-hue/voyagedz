version: '3.8'

services:
  # ==========================================
  # Frontend Service (Nginx)
  # ==========================================
  frontend:
    build: .
    container_name: voyage-dz-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      # Mount for development
      - .:/usr/share/nginx/html
      # Custom Nginx Config for API Proxy
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    networks:
      - voyage-dz-network
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # Backend Service (Node.js/Express)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voyage-dz-backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
      - JWT_SECRET=voyage-dz-secret-key-production-2024
      - NODE_ENV=production
    volumes:
      # Persistent volume for SQLite database (mount data directory)
      - db-data:/app/data
      # Persistent volume for uploaded images
      - uploads-data:/app/uploads
    networks:
      - voyage-dz-network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/cities', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ==========================================
# Networks
# ==========================================
networks:
  voyage-dz-network:
    driver: bridge
    name: voyage-dz-network

# ==========================================
# Volumes (Persistent Storage)
# ==========================================
volumes:
  # SQLite database persistence
  db-data:
    name: voyage-dz-database
  # Uploaded images persistence
  uploads-data:
    name: voyage-dz-uploads
