<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>TEST - Voyage DZ</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            padding: 50px;
            font-family: Arial;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
        }

        .hotel-card {
            background: #0f3460;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        .hotel-card:hover {
            background: #1a4d8f;
        }
    </style>
</head>

<body>
    <h1>🏨 TEST MINIMAL - Voyage DZ</h1>
    <p>Cliquez sur un hôtel :</p>

    <div class="hotel-card" onclick="openModal('Hotel 1')">
        <h3>Hôtel de la Plage</h3>
        <p>Alger • 15 000 DA/nuit</p>
    </div>

    <div class="hotel-card" onclick="openModal('Hotel 2')">
        <h3>Riad du Sahara</h3>
        <p>Oran • 12 000 DA/nuit</p>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Titre Hôtel</h2>
            <p>Description de l'hôtel...</p>
            <button onclick="closeModal()"
                style="padding: 10px 20px; margin-top: 20px; cursor: pointer;">Fermer</button>
        </div>
    </div>

    <script>
        function openModal(hotelName) {
            console.log('Opening modal for:', hotelName);
            document.getElementById('modal-title').textContent = hotelName;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        console.log('✅ Test page loaded successfully');
    </script>
</body>

</html>
